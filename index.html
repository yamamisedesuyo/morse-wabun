<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>モールス和文・いろは順 Ver1.25</title>
<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--muted:#64748b;--accent:#2563eb;--accent-2:#dc2626}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}
.container{max-width:1080px;margin:0 auto;padding:0 16px 48px}
h1{font-size:24px;margin:12px 0 8px}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;background:#fff;padding:10px;border:1px solid #e2e8f0;border-radius:14px;margin:14px 0 18px;position:sticky;top:0}
.controls label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.controls input,.controls select{padding:8px 10px;border:1px solid #cbd5e1;border-radius:10px}
.btn{border:1px solid #cbd5e1;background:#fff;padding:8px 12px;border-radius:10px;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.danger{color:var(--accent-2);border-color:#fecaca}
.iroha-row{display:flex;gap:12px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:12px;margin-bottom:12px}
.row-control{width:160px}
.cards{display:flex;flex-wrap:wrap;gap:10px;flex:1}
.card{border:1px solid #e5e7eb;border-radius:12px;padding:10px;text-align:center;width:100px;background:#fff}
.card.playing{background:#e0ecff;box-shadow:inset 0 0 0 2px var(--accent)}
.kana{font-size:22px;font-weight:700}
.code{font-family:monospace;font-size:12px;color:#334155;min-height:24px}
.btn-replay{margin-top:6px;width:100%;padding:4px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;font-size:12px}
</style>
</head>
<body>
<div class="container">
<h1>モールス和文・いろは順 <span style="font-size:14px;background:#e2e8f0;padding:2px 8px;border-radius:6px">Ver1.25</span></h1>
<div class="controls">
<div><label>WPM</label><input id="wpm" type="number" value="15" style="width:60px"></div>
<div><label>Hz</label><input id="freq" type="number" value="700" style="width:70px"></div>
<div><label>間隔</label><select id="spacing"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
<div><label>秒</label><input id="interval" type="number" value="1.5" step="0.1" style="width:60px"></div>
<div><label><input type="checkbox" id="seqMode">順に</label></div>
<div><label><input type="checkbox" id="checkAll">全チェック</label></div>
<div><button id="autoToggle" class="btn primary">開始</button> <button id="stopAll" class="btn danger">停止</button> <span id="nowPlaying" style="padding:6px 10px;border:1px solid #ccc;border-radius:8px">―</span></div>
</div>
<div id="rows"></div>
<h2>濁点・半濁点</h2><div class="cards" id="dakuten"></div>
</div>
<script>
const rows=[[{k:'イ',c:'・－'},{k:'ロ',c:'・－・－'},{k:'ハ',c:'－・・・'},{k:'ニ',c:'－・－・'},{k:'ホ',c:'－・・'},{k:'ヘ',c:'・'},{k:'ト',c:'・・－・・'}],[{k:'チ',c:'・・－・'},{k:'リ',c:'－－・'},{k:'ヌ',c:'・・・・'},{k:'ル',c:'－・－－・'},{k:'ヲ',c:'・－－－'}],[{k:'ワ',c:'－・－'},{k:'カ',c:'・－・・'},{k:'ヨ',c:'－－'},{k:'タ',c:'－・'},{k:'レ',c:'－－－'},{k:'ソ',c:'－－－・'}],[{k:'ツ',c:'・－・'},{k:'ネ',c:'－－・－'},{k:'ナ',c:'・－・'},{k:'ラ',c:'・・・'},{k:'ム',c:'－'}],[{k:'ウ',c:'・・－'},{k:'ヰ',c:'・－・・－'},{k:'ノ',c:'・・－－'},{k:'オ',c:'・－・・・'},{k:'ク',c:'・・・－'},{k:'ヤ',c:'・－－'},{k:'マ',c:'－・・－'}],[{k:'ケ',c:'－・－－'},{k:'フ',c:'－－・・'},{k:'コ',c:'－－－－'},{k:'エ',c:'－・－－－'},{k:'テ',c:'・－・－－'}],[{k:'ア',c:'－－・－－'},{k:'サ',c:'－・－・－'},{k:'キ',c:'－・－・・'},{k:'ユ',c:'－・・－－'},{k:'メ',c:'－・・・－'},{k:'ミ',c:'・・－・－'},{k:'シ',c:'－－・－・'}],[{k:'ヱ',c:'・－－・・'},{k:'ヒ',c:'－－・・－'},{k:'モ',c:'－・・－・'},{k:'セ',c:'・－－－・'},{k:'ス',c:'－－－・－'}],[{k:'ン',c:'・－・－・'}]];
const rowsWrap=document.getElementById('rows');
rows.forEach((r,i)=>{const d=document.createElement('div');d.className='iroha-row';d.innerHTML=`<div class="row-control"><label><input type="checkbox" data-r="${i}">${i+1}列</label></div><div class="cards"></div>`;const c=d.querySelector('.cards');r.forEach(o=>{const card=document.createElement('div');card.className='card';card.dataset.k=o.k;card.innerHTML=`<div class="kana">${o.k}</div><div class="code">${o.c}</div><button class="btn-replay">再生</button>`;card.querySelector('button').onclick=()=>play(o,card);c.appendChild(card)});rowsWrap.appendChild(d)});
const daku=[{k:'濁点',c:'・・'},{k:'半濁点',c:'・・－－・'}];const dk=document.getElementById('dakuten');daku.forEach(o=>{const card=document.createElement('div');card.className='card';card.innerHTML=`<div class="kana">${o.k}</div><div class="code">${o.c}</div><button class="btn-replay">再生</button>`;card.querySelector('button').onclick=()=>play(o,card);dk.appendChild(card)});
let ctx,playing=false,timer;async function ac(){if(!ctx)ctx=new AudioContext();if(ctx.state=='suspended')await ctx.resume()}function gs(){return{w:+wpm.value,f:+freq.value,s:+spacing.value}};const sleep=m=>new Promise(r=>setTimeout(r,m));async function pc(code,f,w,s){await ac();const d=1.2/w;let t=ctx.currentTime+0.05;const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;g.gain.value=0;o.connect(g).connect(ctx.destination);o.start(t);code.split('').forEach(ch=>{if(ch!='・'&&ch!='－')return;const du=ch=='・'?d:d*3;g.gain.setValueAtTime(.8,t);g.gain.setValueAtTime(.8,t+du-.002);g.gain.linearRampToValueAtTime(0,t+du);t+=du+d});o.stop(t+d*s);return(t-ctx.currentTime)*1000}async function play(o,card){const s=gs();nowPlaying.textContent=o.k;card.classList.add('playing');await sleep(await pc(o.c,s.f,s.w,s.s));card.classList.remove('playing')}function pool(){return[...document.querySelectorAll('[data-r]:checked')].flatMap(cb=>rows[cb.dataset.r])}let seq=0;async function loop(){if(!playing)return;const p=pool();if(!p.length)return timer=setTimeout(loop,500);const o=seqMode.checked?p[seq++%p.length]:p[Math.random()*p.length|0];const card=[...document.querySelectorAll('.card')].find(x=>x.querySelector('.kana').textContent==o.k);await play(o,card);timer=setTimeout(loop,interval.value*1000)}autoToggle.onclick=async()=>{await ac();playing=!playing;autoToggle.textContent=playing?'停止':'開始';if(playing){seq=0;loop()}else clearTimeout(timer)};stopAll.onclick=()=>{playing=false;clearTimeout(timer);autoToggle.textContent='開始';nowPlaying.textContent='―'};checkAll.onchange=e=>document.querySelectorAll('[data-r]').forEach(c=>c.checked=e.target.checked);
</script>
</body>
</html>
