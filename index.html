<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>モールス和文・いろは順 Ver1.25</title>
<style>
    :root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--muted:#64748b;--accent:#2563eb;--accent-2:#dc2626;--ok:#16a34a}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}
  .container{max-width:1080px;margin:0 auto;padding:0 16px 48px}
    h1{font-size:24px;margin:6px 0 2px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;background:var(--card);padding:8px 10px;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin:14px 0 18px;position:sticky;top:58px;z-index:9}
  .controls label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .controls input[type=number],.controls select{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px;background:#fff}
    #spacing{width:110px}
  .btn{appearance:none;border:1px solid #cbd5e1;background:#fff;color:var(--ink);padding:8px 12px;border-radius:10px;font-size:14px;cursor:pointer}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.danger{background:#fff;border-color:#fecaca;color:var(--accent-2)}
  .iroha-row{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid #e2e8f0;border-radius:14px;padding:12px;margin-bottom:12px}
  .row-control{width:160px;flex:none;padding-top:6px}
  .row-title{font-weight:700;margin-bottom:6px}
  .cards{display:flex;flex-wrap:wrap;gap:10px;flex:1}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px 8px 9px;text-align:center;transition:.15s;position:relative;flex:0 0 100px;width:100px}
  .card.playing{box-shadow:inset 0 0 0 2px var(--accent), 0 0 0 3px rgba(37,99,235,.15);background:#e0ecff}
  .char{font-size:22px;font-weight:700;line-height:1;color:var(--ink);margin-bottom:6px;display:flex;justify-content:center;align-items:baseline;gap:4px}
  .kana{font-size:22px;color:var(--ink);font-weight:700}
  .code{font-family:ui-monospace,Consolas,monospace;font-size:12px;letter-spacing:.5px;color:#334155;white-space:pre;line-height:1.25;min-height:28px}
  .btn-replay{margin-top:6px;font-size:12px;padding:5px 0;width:100%;display:block;white-space:nowrap;border:1px solid #e2e8f0;background:#f8fafc;border-radius
