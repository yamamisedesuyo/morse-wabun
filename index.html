<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>гғўгғјгғ«гӮ№е’Ңж–Үгғ»гҒ„гӮҚгҒҜй Ҷ Ver1.26</title>
<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--muted:#64748b;--accent:#2563eb;--accent-2:#dc2626}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}
.container{max-width:1100px;margin:0 auto;padding:0 12px 48px}
h1{font-size:24px;margin:12px 0 8px}
.badge{font-size:12px;color:var(--muted);background:#e2e8f0;padding:2px 8px;border-radius:999px;margin-left:6px}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;background:var(--card);padding:10px;border:1px solid #e2e8f0;border-radius:12px;margin:12px 0 16px;position:sticky;top:0;z-index:10}
.controls label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.controls input,.controls select{padding:7px 8px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
.btn{border:1px solid #cbd5e1;background:#fff;padding:7px 12px;border-radius:8px;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.danger{color:var(--accent-2);border-color:#fecaca}
#nowPlaying{min-width:120px;text-align:center;padding:6px 8px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;font-family:monospace;font-size:13px}
.iroha-row{background:var(--card);border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-bottom:12px}
.row-title{font-weight:700;margin-bottom:8px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 4px;text-align:center}
.card.playing{box-shadow:inset 0 0 0 2px var(--accent);background:#e0ecff}
.kana{font-size:20px;font-weight:700}
.latin{font-size:12px;color:var(--muted);margin-left:3px}
.code{font-family:monospace;font-size:12px;color:#334155;min-height:18px}
.btn-replay{margin-top:4px;width:100%;padding:4px;font-size:11px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px}
@media(min-width:700px){.cards{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}
</style>
</head>
<body>
<div class="container">
<h1>гғўгғјгғ«гӮ№е’Ңж–Үгғ»гҒ„гӮҚгҒҜй Ҷ <span class="badge">Ver1.26</span></h1>
<div class="controls">
<div><label>WPM</label><input id="wpm" type="number" value="18" style="width:60px"></div>
<div><label>Hz</label><input id="freq" type="number" value="750" style="width:70px"></div>
<div><label>й–“йҡ”</label><select id="spacing"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
<div><label>з§’</label><input id="interval" type="number" value="1.2" step="0.1" style="width:55px"></div>
<div><label><input type="checkbox" id="seqMode">й ҶгҒ«</label></div>
<div><label><input type="checkbox" id="checkAll">е…ЁгғҒгӮ§гғғгӮҜ</label></div>
<div><button id="autoToggle" class="btn primary">й–Ӣе§Ӣ</button> <button id="stopAll" class="btn danger">еҒңжӯў</button> <span id="nowPlaying">вҖ•</span></div>
</div>
<div id="rows"></div>
<h2 style="font-size:16px;margin:16px 0 8px">жҝҒзӮ№гғ»еҚҠжҝҒзӮ№</h2><div class="cards" id="dakuten"></div>
</div>
<script>
const rowsData=[
{id:1,label:'1еҲ— гӮӨгғӯгғҸгғӢгғӣгғҳгғҲ',chars:[{k:'гӮӨ',c:'гғ»пјҚ'},{k:'гғӯ',c:'гғ»пјҚгғ»пјҚ'},{k:'гғҸ',c:'пјҚгғ»гғ»гғ»'},{k:'гғӢ',c:'пјҚгғ»пјҚгғ»'},{k:'гғӣ',c:'пјҚгғ»гғ»'},{k:'гғҳ',c:'гғ»'},{k:'гғҲ',c:'гғ»гғ»пјҚгғ»гғ»'}]},
{id:2,label:'2еҲ— гғҒгғӘгғҢгғ«гғІ',chars:[{k:'гғҒ',c:'гғ»гғ»пјҚгғ»'},{k:'гғӘ',c:'пјҚпјҚгғ»'},{k:'гғҢ',c:'гғ»гғ»гғ»гғ»'},{k:'гғ«',c:'пјҚгғ»пјҚпјҚгғ»'},{k:'гғІ',c:'гғ»пјҚпјҚпјҚ'}]},
{id:3,label:'3еҲ— гғҜгӮ«гғЁгӮҝгғ¬гӮҪ',chars:[{k:'гғҜ',c:'пјҚгғ»пјҚ'},{k:'гӮ«',c:'гғ»пјҚгғ»гғ»'},{k:'гғЁ',c:'пјҚпјҚ'},{k:'гӮҝ',c:'пјҚгғ»'},{k:'гғ¬',c:'пјҚпјҚпјҚ'},{k:'гӮҪ',c:'пјҚпјҚпјҚгғ»'}]},
{id:4,label:'4еҲ— гғ„гғҚгғҠгғ©гғ ',chars:[{k:'гғ„',c:'гғ»пјҚгғ»'},{k:'гғҚ',c:'пјҚпјҚгғ»пјҚ'},{k:'гғҠ',c:'гғ»пјҚгғ»'},{k:'гғ©',c:'гғ»гғ»гғ»'},{k:'гғ ',c:'пјҚ'}]},
{id:5,label:'5еҲ— гӮҰгғ°гғҺгӮӘгӮҜгғӨгғһ',chars:[{k:'гӮҰ',c:'гғ»гғ»пјҚ'},{k:'гғ°',c:'гғ»пјҚгғ»гғ»пјҚ'},{k:'гғҺ',c:'гғ»гғ»пјҚпјҚ'},{k:'гӮӘ',c:'гғ»пјҚгғ»гғ»гғ»'},{k:'гӮҜ',c:'гғ»гғ»гғ»пјҚ'},{k:'гғӨ',c:'гғ»пјҚпјҚ'},{k:'гғһ',c:'пјҚгғ»гғ»пјҚ'}]},
{id:6,label:'6еҲ— гӮұгғ•гӮігӮЁгғҶ',chars:[{k:'гӮұ',c:'пјҚгғ»пјҚпјҚ'},{k:'гғ•',c:'пјҚпјҚгғ»гғ»'},{k:'гӮі',c:'пјҚпјҚпјҚпјҚ'},{k:'гӮЁ',c:'пјҚгғ»пјҚпјҚпјҚ'},{k:'гғҶ',c:'гғ»пјҚгғ»пјҚпјҚ'}]},
{id:7,label:'7еҲ— гӮўгӮөгӮӯгғҰгғЎгғҹгӮ·',chars:[{k:'гӮў',c:'пјҚпјҚгғ»пјҚпјҚ'},{k:'гӮө',c:'пјҚгғ»пјҚгғ»пјҚ'},{k:'гӮӯ',c:'пјҚгғ»пјҚгғ»гғ»'},{k:'гғҰ',c:'пјҚгғ»гғ»пјҚпјҚ'},{k:'гғЎ',c:'пјҚгғ»гғ»гғ»пјҚ'},{k:'гғҹ',c:'гғ»гғ»пјҚгғ»пјҚ'},{k:'гӮ·',c:'пјҚпјҚгғ»пјҚгғ»'}]},
{id:8,label:'8еҲ— гғұгғ’гғўгӮ»гӮ№',chars:[{k:'гғұ',c:'гғ»пјҚпјҚгғ»гғ»'},{k:'гғ’',c:'пјҚпјҚгғ»гғ»пјҚ'},{k:'гғў',c:'пјҚгғ»гғ»пјҚгғ»'},{k:'гӮ»',c:'гғ»пјҚпјҚпјҚгғ»'},{k:'гӮ№',c:'пјҚпјҚпјҚгғ»пјҚ'}]},
{id:9,label:'9еҲ— гғі',chars:[{k:'гғі',c:'гғ»пјҚгғ»пјҚгғ»'}]}
];
const map={'гғ»пјҚ':'A','пјҚгғ»гғ»гғ»':'B','пјҚгғ»пјҚгғ»':'C','пјҚгғ»гғ»':'D','гғ»':'E','гғ»гғ»пјҚгғ»':'F','пјҚпјҚгғ»':'G','гғ»гғ»гғ»гғ»':'H','гғ»гғ»':'I','гғ»пјҚпјҚпјҚ':'J','пјҚгғ»пјҚ':'K','гғ»пјҚгғ»гғ»':'L','пјҚпјҚ':'M','пјҚгғ»':'N','пјҚпјҚпјҚ':'O','гғ»пјҚпјҚгғ»':'P','пјҚпјҚгғ»пјҚ':'Q','гғ»пјҚгғ»':'R','гғ»гғ»гғ»':'S','пјҚ':'T','гғ»гғ»пјҚ':'U','гғ»гғ»гғ»пјҚ':'V','гғ»пјҚпјҚ':'W','пјҚгғ»гғ»пјҚ':'X','пјҚгғ»пјҚпјҚ':'Y','пјҚпјҚгғ»гғ»':'Z'};
const rowsWrap=document.getElementById('rows');
rowsData.forEach(r=>{
  const d=document.createElement('div');d.className='iroha-row';
  d.innerHTML=`<div class="row-title"><label><input type="checkbox" data-r="${r.id}"> ${r.label}</label></div><div class="cards"></div>`;
  const c=d.querySelector('.cards');
  r.chars.forEach(o=>{
    const card=document.createElement('div');card.className='card';card.dataset.k=o.k;
    card.innerHTML=`<div><span class="kana">${o.k}</span><span class="latin">${map[o.c]||''}</span></div><div class="code">${o.c}</div><button class="btn-replay">еҶҚз”ҹ</button>`;
    card.querySelector('button').onclick=()=>play(o,card);
    c.appendChild(card);
  });
  rowsWrap.appendChild(d);
});
const dakuten=[{k:'жҝҒзӮ№',c:'гғ»гғ»'},{k:'еҚҠжҝҒзӮ№',c:'гғ»гғ»пјҚпјҚгғ»'}];
const dk=document.getElementById('dakuten');
dakuten.forEach(o=>{const card=document.createElement('div');card.className='card';card.innerHTML=`<div class="kana">${o.k}</div><div class="code">${o.c}</div><button class="btn-replay">еҶҚз”ҹ</button>`;card.querySelector('button').onclick=()=>play(o,card);dk.appendChild(card)});

let ctx,auto=false,timer,seq=0,active=new Set();
async function ac(){if(!ctx)ctx=new AudioContext();if(ctx.state=='suspended')await ctx.resume();}
function gs(){return{w:+wpm.value,f:+freq.value,s:+spacing.value};}
const sleep=m=>new Promise(r=>setTimeout(r,m));
async function pc(code,f,w,s){await ac();const d=1.2/w;let t=ctx.currentTime+0.05;const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;g.gain.value=0;o.connect(g).connect(ctx.destination);o.start(t);active.add(o);for(const ch of code){if(ch!=='гғ»'&&ch!=='пјҚ')continue;const du=ch==='гғ»'?d:d*3;g.gain.setValueAtTime(.8,t);g.gain.setValueAtTime(.8,t+du-.002);g.gain.linearRampToValueAtTime(0,t+du);t+=du+d;}o.stop(t+d*s*2);o.onended=()=>active.delete(o);return(t-ctx.currentTime)*1000;}
async function play(o,card){nowPlaying.textContent=`${o.k} ${o.c}`;card&&card.classList.add('playing');const s=gs();await sleep(await pc(o.c,s.f,s.w,s.s));card&&card.classList.remove('playing');}
function pool(){return[...document.querySelectorAll('[data-r]:checked')].flatMap(cb=>rowsData.find(r=>r.id==cb.dataset.r).chars);}
async function loop(){if(!auto)return;const p=pool();if(!p.length)return timer=setTimeout(loop,500);const o=seqMode.checked?p[seq++%p.length]:p[Math.random()*p.length|0];const card=[...document.querySelectorAll('.card')].find(x=>x.querySelector('.kana')?.textContent===o.k);await play(o,card);timer=setTimeout(loop,interval.value*1000);}
autoToggle.onclick=async()=>{await ac();auto=!auto;autoToggle.textContent=auto?'еҒңжӯў':'й–Ӣе§Ӣ';if(auto){seq=0;loop()}else clearTimeout(timer);};
stopAll.onclick=()=>{auto=false;clearTimeout(timer);autoToggle.textContent='й–Ӣе§Ӣ';nowPlaying.textContent='вҖ•';active.forEach(o=>{try{o.stop()}catch{}});};
checkAll.onchange=e=>document.querySelectorAll('[data-r]').forEach(c=>c.checked=e.target.checked);
</script>
</body>
</html>
