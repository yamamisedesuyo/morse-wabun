    {kana:'гЃ†',code:'гѓ»гѓ»пјЌ'},{kana:'г‚ђ',code:'гѓ»пјЌгѓ»гѓ»пјЌ'},{kana:'гЃ®',code:'гѓ»гѓ»пјЌпјЌ'},{kana:'гЃЉ',code:'гѓ»пјЌгѓ»гѓ»гѓ»'},{kana:'гЃЏ',code:'гѓ»гѓ»гѓ»пјЌ'},{kana:'г‚„',code:'гѓ»пјЌпјЌ'},{kana:'гЃѕ',code:'пјЌгѓ»гѓ»пјЌ'}
  ]},

    {kana:'гЃ‘',code:'пјЌгѓ»пјЌпјЌ'},{kana:'гЃµ',code:'пјЌпјЌгѓ»гѓ»'},{kana:'гЃ“',code:'пјЌпјЌпјЌпјЌ'},{kana:'гЃ€',code:'пјЌгѓ»пјЌпјЌпјЌ'},{kana:'гЃ¦',code:'гѓ»пјЌгѓ»пјЌпјЌ'}
  ]},

const codeToLatin = {
'гѓ»пјЌ':'A',

'пјЌгѓ»гѓ»':'D',

'гѓ»гѓ»':'I',
'гѓ»пјЌпјЌпјЌ':'J',

'пјЌпјЌ':'M',

};

const dakutenData = [
  {kana:'жїЃз‚№',code:'гѓ»гѓ»'},
  {kana:'еЌЉжїЃз‚№',code:'гѓ»гѓ»пјЌпјЌгѓ»'}

const rowsContainer = document.getElementById('rows');

rowsData.forEach(row=>{
  const rowEl = document.createElement('div');
  rowEl.className = 'iroha-row';
  rowEl.innerHTML = `<div class="row-control"><label><input type="checkbox" data-row="${row.id}"> ${row.id}е€— ${row.label}</label></div><div class="cards"></div>`;
  const cardsDiv = rowEl.querySelector('.cards');
  row.chars.forEach(ch=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.kana = ch.kana;
    card.dataset.code = ch.code;
    card.innerHTML = `<div class="kana">${ch.kana}<span class="latin">${codeToLatin[ch.code]||''}</span></div><div class="code">${ch.code}</div><button class="play-btn">е†Ќз”џ</button>`;

const dakutenWrap = document.getElementById('dakuten');
dakutenData.forEach(ch=>{

  card.dataset.code = ch.code;
  card.innerHTML = `<div class="kana" style="font-size:20px;margin-top:6px">${ch.kana}</div><div class="code">${ch.code}</div><button class="play-btn">е†Ќз”џ</button>`;

  dakutenWrap.appendChild(card);
});

let audioCtx = null;
const activeOscs = new Set();
let autoPlaying = false;
let autoTimer = null;

function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  if(audioCtx.state==='suspended'){ audioCtx.resume(); }
}
function getSettings(){
  return {
    wpm: Math.max(5,Math.min(40,parseInt(document.getElementById('wpm').value)||15)),
    freq: Math.max(300,Math.min(1200,parseInt(document.getElementById('freq').value)||700)),
    spacing: parseInt(document.getElementById('spacing').value)||3
  };
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function playCode(code,freq,wpm,spacingMult){
  ensureAudio();
  const dot = 1.2 / wpm;
  const now = audioCtx.currentTime;
  const t0 = now + 0.01;
  let t = t0;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.value = 0;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  activeOscs.add(osc);
  const syms = code.split('').filter(c=>c==='гѓ»'||c==='пјЌ');
  syms.forEach((s,i)=>{
    const dur = (s==='гѓ»') ? dot : dot*3;
    gain.gain.setValueAtTime(0.9, t);
    gain.gain.linearRampToValueAtTime(0.9, t + dur - 0.004);
    gain.gain.linearRampToValueAtTime(0, t + dur);
    t += dur;
    if(i < syms.length-1) t += dot;
  });
  t += dot * 3 * spacingMult;
  osc.stop(t + 0.02);
  osc.onended = ()=> activeOscs.delete(osc);
  return Math.max(200, (t - now) * 1000 + 30);
}

async function playChar(chObj, cardEl){
  const {wpm,freq,spacing} = getSettings();
  if(cardEl) cardEl.classList.add('playing');
  const dur = playCode(chObj.code, freq, wpm, spacing);
  await sleep(dur);
  if(cardEl) cardEl.classList.remove('playing');
}
function handleManual(ch,card){
  playChar(ch,card);
}

function stopAllAudio(){
  activeOscs.forEach(osc=>{ try{osc.stop();}catch(e){} });
  activeOscs.clear();
  document.querySelectorAll('.card.playing').forEach(c=>c.classList.remove('playing'));
}
function getPool(){
  const pool=[];
  document.querySelectorAll('.iroha-row input[type=checkbox]:checked').forEach(cb=>{
    const rowId = parseInt(cb.dataset.row);
    const row = rowsData.find(r=>r.id===rowId);
    if(row) row.chars.forEach(ch=>pool.push(ch));
  });
  return pool;
}
let seqIndex = 0;
async function autoLoop(){
  if(!autoPlaying) return;
  const pool = getPool();
  if(pool.length===0){
    autoTimer = setTimeout(autoLoop, 500);
    return;
  }
  const seqMode = document.getElementById('seqMode')?.checked;
  let pick;
  if(seqMode){
    if(seqIndex >= pool.length) seqIndex = 0;
    pick = pool[seqIndex];
    seqIndex++;
  } else {
    pick = pool[Math.floor(Math.random()*pool.length)];
  }
  const card = [...document.querySelectorAll('.card')].find(c=>c.dataset.kana===pick.kana && c.dataset.code===pick.code);
  try{ await playChar(pick, card); }catch(e){}
  if(!autoPlaying) return;
  const intervalMs = Math.max(300, parseFloat(document.getElementById('interval').value)*1000);
  autoTimer = setTimeout(autoLoop, intervalMs);
}
function resetSeq(){ seqIndex = 0; }
function stopAuto(){
  autoPlaying = false;
  const btn = document.getElementById('autoToggle');
  btn.textContent = 'и‡Єе‹•е†Ќз”џ й–‹е§‹';
  btn.classList.remove('active');
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
}
function startAuto(){
  ensureAudio();
  autoPlaying = true;
  resetSeq();
  const btn = document.getElementById('autoToggle');
  btn.textContent = 'и‡Єе‹•е†Ќз”џ еЃњж­ў';
  btn.classList.add('active');
  autoLoop();
}
document.getElementById('autoToggle').addEventListener('click',()=>{
  if(autoPlaying) stopAuto(); else startAuto();
});
document.getElementById('stopAll').addEventListener('click',()=>{
  stopAuto();
  stopAllAudio();
});
</script>
