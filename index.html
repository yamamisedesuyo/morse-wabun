<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>гғўгғјгғ«гӮ№е’Ңж–Үгғ»гҒ„гӮҚгҒҜй Ҷ Ver1.28b</title>
<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--muted:#64748b;--accent:#2563eb}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}
body.locked{overflow:hidden}
.container{max-width:1100px;margin:0 auto;padding:0 12px 48px}
h1{font-size:22px;margin:12px 0 8px}
.badge{font-size:12px;color:var(--muted);background:#e2e8f0;padding:2px 8px;border-radius:999px;margin-left:6px}
.panel{background:var(--card);border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin:12px 0}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:6px 0}
label.small{font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
input,select{padding:6px 8px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
.btn{border:1px solid #cbd5e1;background:#fff;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.active{background:#e0ecff;border-color:var(--accent)}
#nowPlaying{min-width:110px;text-align:center;padding:5px 8px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;font-family:monospace;font-size:12px}
.iroha-row{background:var(--card);border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-bottom:12px}
.row-title{font-weight:700;margin-bottom:8px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 4px;text-align:center}
.card.playing{box-shadow:inset 0 0 0 2px var(--accent);background:#e0ecff}
.kana{font-size:20px;font-weight:700}
.latin{font-size:12px;color:var(--muted);margin-left:3px}
.code{font-family:monospace;font-size:12px;color:#334155;min-height:18px}
.btn-replay{margin-top:4px;width:100%;padding:4px;font-size:11px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px}
.status{font-size:12px;color:var(--muted);margin-left:8px}
.radio-group{display:flex;gap:12px;align-items:center;font-size:13px}
</style>
</head>
<body>
<div class="container">
<h1>гғўгғјгғ«гӮ№е’Ңж–Үгғ»гҒ„гӮҚгҒҜй Ҷ <span class="badge">Ver1.28b</span></h1>

<div class="panel">
<div class="row">
<div><label class="small">WPM</label><input id="wpm" type="number" value="18" style="width:60px"></div>
<div><label class="small">Hz</label><input id="freq" type="number" value="750" style="width:68px"></div>
<div><label class="small">ж–Үеӯ—й–“йҡ”</label>
<select id="charGap">
<option value="1">й•·зӮ№Г—1</option>
<option value="2">й•·зӮ№Г—2</option>
<option value="3" selected>й•·зӮ№Г—3пјҲжЁҷжә–пјү</option>
<option value="4">й•·зӮ№Г—4</option>
<option value="5">й•·зӮ№Г—5</option>
</select>
</div>
</div>
<div class="row">
<div class="radio-group">
<span style="color:var(--muted)">еҶҚз”ҹй Ҷ:</span>
<label><input type="radio" name="mode" value="random" checked> гғ©гғігғҖгғ </label>
<label><input type="radio" name="mode" value="seq"> гҒ„гӮҚгҒҜй Ҷ</label>
<label style="margin-left:8px"><input type="checkbox" id="noRepeat" checked> еҗҢгҒҳеӯ—гӮ’з¶ҡгҒ‘гҒӘгҒ„</label>
</div>
</div>
<div class="row">
<span style="font-size:12px;color:var(--muted)">гғӘгғ”гғјгғҲ:</span>
<button class="btn repeatBtn active" data-r="1">1еӣһ</button>
<button class="btn repeatBtn" data-r="3">3еӣһ</button>
<button class="btn repeatBtn" data-r="5">5еӣһ</button>
</div>
<div class="row">
<span style="font-size:12px;color:var(--muted)">зӣ®жЁҷж–Үеӯ—ж•°:</span>
<button class="btn goalBtn" data-g="50">50ж–Үеӯ—</button>
<button class="btn goalBtn" data-g="100">100ж–Үеӯ—</button>
<button class="btn goalBtn" data-g="200">200ж–Үеӯ—</button>
<button class="btn goalBtn active" data-g="0">з„ЎеҲ¶йҷҗ</button>
<span class="status" id="counter">0 / -</span>
</div>
<div class="row">
<button id="autoToggle" class="btn primary">й–Ӣе§Ӣ</button>
<span id="nowPlaying">вҖ•</span>
<label style="margin-left:auto"><input type="checkbox" id="checkAll">е…ЁгғҒгӮ§гғғгӮҜ</label>
<label style="margin-left:8px"><input type="checkbox" id="lockFrame" checked> жһ еӣәе®ҡ</label>
</div>
</div>

<div id="rows"></div>
<h2 style="font-size:15px;margin:14px 0 6px">жҝҒзӮ№гғ»еҚҠжҝҒзӮ№</h2><div class="cards" id="dakuten"></div>
</div>
<script>
const rowsData=[
{id:1,label:'1еҲ— гӮӨгғӯгғҸгғӢгғӣгғҳгғҲ',chars:[{k:'гӮӨ',c:'гғ»пјҚ'},{k:'гғӯ',c:'гғ»пјҚгғ»пјҚ'},{k:'гғҸ',c:'пјҚгғ»гғ»гғ»'},{k:'гғӢ',c:'пјҚгғ»пјҚгғ»'},{k:'гғӣ',c:'пјҚгғ»гғ»'},{k:'гғҳ',c:'гғ»'},{k:'гғҲ',c:'гғ»гғ»пјҚгғ»гғ»'}]},
{id:2,label:'2еҲ— гғҒгғӘгғҢгғ«гғІ',chars:[{k:'гғҒ',c:'гғ»гғ»пјҚгғ»'},{k:'гғӘ',c:'пјҚпјҚгғ»'},{k:'гғҢ',c:'гғ»гғ»гғ»гғ»'},{k:'гғ«',c:'пјҚгғ»пјҚпјҚгғ»'},{k:'гғІ',c:'гғ»пјҚпјҚпјҚ'}]},
{id:3,label:'3еҲ— гғҜгӮ«гғЁгӮҝгғ¬гӮҪ',chars:[{k:'гғҜ',c:'пјҚгғ»пјҚ'},{k:'гӮ«',c:'гғ»пјҚгғ»гғ»'},{k:'гғЁ',c:'пјҚпјҚ'},{k:'гӮҝ',c:'пјҚгғ»'},{k:'гғ¬',c:'пјҚпјҚпјҚ'},{k:'гӮҪ',c:'пјҚпјҚпјҚгғ»'}]},
{id:4,label:'4еҲ— гғ„гғҚгғҠгғ©гғ ',chars:[{k:'гғ„',c:'гғ»пјҚпјҚгғ»'},{k:'гғҚ',c:'пјҚпјҚгғ»пјҚ'},{k:'гғҠ',c:'гғ»пјҚгғ»'},{k:'гғ©',c:'гғ»гғ»гғ»'},{k:'гғ ',c:'пјҚ'}]},
{id:5,label:'5еҲ— гӮҰгғ°гғҺгӮӘгӮҜгғӨгғһ',chars:[{k:'гӮҰ',c:'гғ»гғ»пјҚ'},{k:'гғ°',c:'гғ»пјҚгғ»гғ»пјҚ'},{k:'гғҺ',c:'гғ»гғ»пјҚпјҚ'},{k:'гӮӘ',c:'гғ»пјҚгғ»гғ»гғ»'},{k:'гӮҜ',c:'гғ»гғ»гғ»пјҚ'},{k:'гғӨ',c:'гғ»пјҚпјҚ'},{k:'гғһ',c:'пјҚгғ»гғ»пјҚ'}]},
{id:6,label:'6еҲ— гӮұгғ•гӮігӮЁгғҶ',chars:[{k:'гӮұ',c:'пјҚгғ»пјҚпјҚ'},{k:'гғ•',c:'пјҚпјҚгғ»гғ»'},{k:'гӮі',c:'пјҚпјҚпјҚпјҚ'},{k:'гӮЁ',c:'пјҚгғ»пјҚпјҚпјҚ'},{k:'гғҶ',c:'гғ»пјҚгғ»пјҚпјҚ'}]},
{id:7,label:'7еҲ— гӮўгӮөгӮӯгғҰгғЎгғҹгӮ·',chars:[{k:'гӮў',c:'пјҚпјҚгғ»пјҚпјҚ'},{k:'гӮө',c:'пјҚгғ»пјҚгғ»пјҚ'},{k:'гӮӯ',c:'пјҚгғ»пјҚгғ»гғ»'},{k:'гғҰ',c:'пјҚгғ»гғ»пјҚпјҚ'},{k:'гғЎ',c:'пјҚгғ»гғ»гғ»пјҚ'},{k:'гғҹ',c:'гғ»гғ»пјҚгғ»пјҚ'},{k:'гӮ·',c:'пјҚпјҚгғ»пјҚгғ»'}]},
{id:8,label:'8еҲ— гғұгғ’гғўгӮ»гӮ№',chars:[{k:'гғұ',c:'гғ»пјҚпјҚгғ»гғ»'},{k:'гғ’',c:'пјҚпјҚгғ»гғ»пјҚ'},{k:'гғў',c:'пјҚгғ»гғ»пјҚгғ»'},{k:'гӮ»',c:'гғ»пјҚпјҚпјҚгғ»'},{k:'гӮ№',c:'пјҚпјҚпјҚгғ»пјҚ'}]},
{id:9,label:'9еҲ— гғі',chars:[{k:'гғі',c:'гғ»пјҚгғ»пјҚгғ»'}]}
];
const map={'гғ»пјҚ':'A','пјҚгғ»гғ»гғ»':'B','пјҚгғ»пјҚгғ»':'C','пјҚгғ»гғ»':'D','гғ»':'E','гғ»гғ»пјҚгғ»':'F','пјҚпјҚгғ»':'G','гғ»гғ»гғ»гғ»':'H','гғ»гғ»':'I','гғ»пјҚпјҚпјҚ':'J','пјҚгғ»пјҚ':'K','гғ»пјҚгғ»гғ»':'L','пјҚпјҚ':'M','пјҚгғ»':'N','пјҚпјҚпјҚ':'O','гғ»пјҚпјҚгғ»':'P','пјҚпјҚгғ»пјҚ':'Q','гғ»пјҚгғ»':'R','гғ»гғ»гғ»':'S','пјҚ':'T','гғ»гғ»пјҚ':'U','гғ»гғ»гғ»пјҚ':'V','гғ»пјҚпјҚ':'W','пјҚгғ»гғ»пјҚ':'X','пјҚгғ»пјҚпјҚ':'Y','пјҚпјҚгғ»гғ»':'Z'};
const rowsWrap=document.getElementById('rows');
rowsData.forEach(r=>{
  const d=document.createElement('div');d.className='iroha-row';
  d.innerHTML=`<div class="row-title"><label><input type="checkbox" data-r="${r.id}" checked> ${r.label}</label></div><div class="cards"></div>`;
  const c=d.querySelector('.cards');
  r.chars.forEach(o=>{
    const card=document.createElement('div');card.className='card';card.dataset.k=o.k;
    card.innerHTML=`<div><span class="kana">${o.k}</span><span class="latin">${map[o.c]||''}</span></div><div class="code">${o.c}</div><button class="btn-replay">еҶҚз”ҹ</button>`;
    card.querySelector('button').onclick=()=>playItem(o,card);
    c.appendChild(card);
  });
  rowsWrap.appendChild(d);
});
document.getElementById('dakuten').innerHTML='';
[{k:'жҝҒзӮ№',c:'гғ»гғ»'},{k:'еҚҠжҝҒзӮ№',c:'гғ»гғ»пјҚпјҚгғ»'}].forEach(o=>{const card=document.createElement('div');card.className='card';card.innerHTML=`<div class="kana">${o.k}</div><div class="code">${o.c}</div><button class="btn-replay">еҶҚз”ҹ</button>`;card.querySelector('button').onclick=()=>playItem(o,card);document.getElementById('dakuten').appendChild(card)});

let ctx,auto=false,timer,seq=0,active=new Set(),lastK=null,count=0,goal=0,repeat=1;
async function ac(){if(!ctx)ctx=new AudioContext();if(ctx.state=='suspended')await ctx.resume();}
const sleep=m=>new Promise(r=>setTimeout(r,m));
async function playCode(code,f,w){const d=1.2/w;let t=ctx.currentTime+0.05;const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;g.gain.value=0;o.connect(g).connect(ctx.destination);o.start(t);active.add(o);for(const ch of code){if(ch!=='гғ»'&&ch!=='пјҚ')continue;const du=ch==='гғ»'?d:d*3;g.gain.setValueAtTime(.8,t);g.gain.setValueAtTime(.8,t+du-.002);g.gain.linearRampToValueAtTime(0,t+du);t+=du+d;}o.stop(t);o.onended=()=>active.delete(o);return(t-ctx.currentTime)*1000;}
async function playItem(o,card){await ac();nowPlaying.textContent=`${o.k} ${o.c}`;card&&card.classList.add('playing');const f=+freq.value,w=+wpm.value;for(let i=0;i<repeat;i++){await sleep(await playCode(o.c,f,w));if(i<repeat-1){const gap=1200/w*3;await sleep(gap);}}card&&card.classList.remove('playing');}
function pool(){return[...document.querySelectorAll('[data-r]:checked')].flatMap(cb=>rowsData.find(r=>r.id==cb.dataset.r).chars);}
function updateCounter(){counter.textContent=`${count} / ${goal?goal:'-'}`;}
function isSeq(){return document.querySelector('input[name="mode"]:checked').value==='seq';}
function charGapMs(w){const dah=3*1.2/w*1000;return dah*+charGap.value;}
async function loop(){if(!auto)return;const p=pool();if(!p.length){auto=false;autoToggle.textContent='й–Ӣе§Ӣ';document.body.classList.remove('locked');return;}let pick;if(isSeq()){pick=p[seq++%p.length];}else{let tries=0;do{pick=p[Math.random()*p.length|0];tries++;}while(noRepeat.checked&&p.length>1&&pick.k===lastK&&tries<10);}lastK=pick.k;const card=[...document.querySelectorAll('.card')].find(x=>x.querySelector('.kana')?.textContent===pick.k);await playItem(pick,card);count++;updateCounter();if(goal&&count>=goal){auto=false;autoToggle.textContent='й–Ӣе§Ӣ';nowPlaying.textContent='йҒ”жҲҗпјҒ';document.body.classList.remove('locked');return;}timer=setTimeout(loop,charGapMs(+wpm.value));}
autoToggle.onclick=async()=>{await ac();auto=!auto;autoToggle.textContent=auto?'еҒңжӯў':'й–Ӣе§Ӣ';if(auto){count=0;seq=0;lastK=null;updateCounter();if(document.getElementById('lockFrame').checked)document.body.classList.add('locked');loop()}else{clearTimeout(timer);nowPlaying.textContent='вҖ•';document.body.classList.remove('locked');active.forEach(o=>{try{o.stop()}catch{}});}};
const checkAll=document.getElementById('checkAll');
function syncCheckAll(){const all=[...document.querySelectorAll('[data-r]')];checkAll.checked=all.length>0 && all.every(c=>c.checked);}
checkAll.onchange=e=>{document.querySelectorAll('[data-r]').forEach(c=>c.checked=e.target.checked);};
document.addEventListener('change',e=>{if(e.target.matches('[data-r]'))syncCheckAll();});
window.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('[data-r]').forEach(c=>c.checked=true);syncCheckAll();});
syncCheckAll();
document.querySelectorAll('.repeatBtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.repeatBtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');repeat=+b.dataset.r;});
document.querySelectorAll('.goalBtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.goalBtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');goal=+b.dataset.g;updateCounter();});
updateCounter();
</script>
</body>
</html>
